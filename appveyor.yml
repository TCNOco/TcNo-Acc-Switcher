version: '{build}'
skip_non_tags: true
skip_branch_with_pr: true

matrix:
  fast_finish: true

# https://www.appveyor.com/docs/build-environment/#build-worker-images
image: Visual Studio 2022

environment:
  GOFLAGS: -mod=mod
  DATEVERSION: $(APPVEYOR_REPO_TAG_NAME)
  SIGNPATH_ORGANIZATION_ID: "a2a88c4e-72da-4d2c-925e-91f41aff9d77"
  SIGNPATH_PROJECT_SLUG: "TcNo-Acc-Switcher"
  SIGNPATH_POLICY_SLUG: "test-signing"

pull_requests:
  do_not_increment_build_number: true

init:
  - ps: |
      # pnpm/vite and wails3 log to stderr; PS 7 treats that as NativeCommandError.
      $ErrorActionPreference = 'Continue'
      if (Get-Variable -Name PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
        $PSNativeCommandUseErrorActionPreference = $false
      }
  - ps: Write-Host "APPVEYOR_REPO_TAG_NAME is $env:APPVEYOR_REPO_TAG_NAME"
  - ps: Write-Host "DATEVERSION is $env:DATEVERSION"
#  - ps: iex ((new-object net.webclient).DownloadString('https://raw.githubusercontent.com/appveyor/ci/master/scripts/enable-rdp.ps1'))

install:
  - ps: Install-Module -Name SignPath -RequiredVersion 4.4.6 -Force -Scope CurrentUser
  - npm install -g pnpm
  - go install github.com/wailsapp/wails/v3/cmd/wails3@latest
  - set PATH=%USERPROFILE%\go\bin;%PATH%
  - ps: |
      Write-Host "Installing NSIS 7z plugin..."
      $downloadUrl = "https://nsis.sourceforge.io/mediawiki/images/6/69/Nsis7z_19.00.7z"
      $destinationFolder = "C:\Program Files (x86)\NSIS"
      $tempDownloadPath = "$env:TEMP\Nsis7z_19.00.7z"
      $extractPath = "$env:TEMP\NsisExtracted"
      Invoke-WebRequest -Uri $downloadUrl -OutFile $tempDownloadPath
      if (-Not (Test-Path -Path $extractPath)) {
        New-Item -ItemType Directory -Path $extractPath | Out-Null
      }
      & 7z x "$tempDownloadPath" -o"$extractPath" -y
      $foldersToMerge = @("Contrib", "Examples", "Plugins")
      foreach ($folder in $foldersToMerge) {
        $sourcePath = Join-Path -Path $extractPath -ChildPath $folder
        $destinationPath = Join-Path -Path $destinationFolder -ChildPath $folder
        if (Test-Path -Path $sourcePath) {
          Copy-Item -Path "$sourcePath\*" -Destination $destinationPath -Recurse -Force
        }
      }
      Remove-Item -Path $tempDownloadPath -Force
      Remove-Item -Path $extractPath -Recurse -Force
      Write-Host "NSIS 7z plugin installed."

build_script:
  - ps: |
      $tag = $env:DATEVERSION -replace '^v', ''
      $nsisVersion = "$tag.0"
      $env:APP_VERSION = $tag
      $env:NSIS_VERSION = $nsisVersion
      Write-Host "Tag: $env:DATEVERSION  Version: $tag  NSIS: $nsisVersion"

      Write-Host "Updating config.yml with tag version..."
      $configPath = "$env:APPVEYOR_BUILD_FOLDER\build\config.yml"
      $config = Get-Content -Raw $configPath
      $config = $config -replace '(?m)^(\s+)version:\s*"[^"]*"', "`${1}version: `"$tag`""
      [System.IO.File]::WriteAllText($configPath, $config, [System.Text.UTF8Encoding]::new($false))

      $infoPath = "$env:APPVEYOR_BUILD_FOLDER\build\windows\info.json"
      $info = Get-Content -Raw $infoPath | ConvertFrom-Json
      $info.fixed.file_version = $nsisVersion
      $info.info.'0000'.ProductVersion = $nsisVersion
      $json = $info | ConvertTo-Json -Depth 4
      $utf8nobom = New-Object System.Text.UTF8Encoding($false)
      [System.IO.File]::WriteAllText($infoPath, $json, $utf8nobom)
      Write-Host "config.yml and info.json updated."
  - go mod tidy
  - ps: |
      Push-Location "$env:APPVEYOR_BUILD_FOLDER\frontend"
      pnpm install --frozen-lockfile
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      Pop-Location
  - wails3 generate bindings -f "-tags production" -clean=true -ts
  - ps: |
      Push-Location "$env:APPVEYOR_BUILD_FOLDER\frontend"
      $env:PRODUCTION = "true"
      pnpm run build
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      Pop-Location
  - ps: cd build; wails3 generate icons -input appicon.png -macfilename darwin/icons.icns -windowsfilename windows/icon.ico; cd ..
  - ps: Copy-Item -Force "$env:APPVEYOR_BUILD_FOLDER\other\NSIS\img\icon.ico" "$env:APPVEYOR_BUILD_FOLDER\build\windows\icon.ico"
  - ps: cd build; wails3 generate syso -arch amd64 -icon windows/icon.ico -manifest windows/wails.exe.manifest -info windows/info.json -out ..\wails_windows_amd64.syso; cd ..
  - go build -tags production -trimpath -buildvcs=false -ldflags="-w -s -H windowsgui" -o bin\TcNo-Acc-Switcher.exe
  - ps: Remove-Item -Force *.syso
  - ps: New-Item -ItemType Directory -Force -Path bin | Out-Null; Copy-Item -Force Platforms.json bin\Platforms.json

after_build:
  - ps: |
      Write-Host "NSIS VIProductVersion: $env:NSIS_VERSION"
      Write-Host "NSIS DisplayVersion: $env:DATEVERSION"

      Write-Host "Signing EXE with SignPath..."
      Submit-SigningRequest `
        -InputArtifactPath "$env:APPVEYOR_BUILD_FOLDER\bin\TcNo-Acc-Switcher.exe" `
        -ApiToken $env:SIGNPATH_API_TOKEN `
        -OrganizationId $env:SIGNPATH_ORGANIZATION_ID `
        -ProjectSlug $env:SIGNPATH_PROJECT_SLUG `
        -SigningPolicySlug $env:SIGNPATH_POLICY_SLUG `
        -OutputArtifactPath "$env:APPVEYOR_BUILD_FOLDER\bin\TcNo-Acc-Switcher-signed.exe" `
        -WaitForCompletion
      Move-Item -Force "$env:APPVEYOR_BUILD_FOLDER\bin\TcNo-Acc-Switcher-signed.exe" "$env:APPVEYOR_BUILD_FOLDER\bin\TcNo-Acc-Switcher.exe"

      Write-Host "Signing with Ed25519..."
      $keyPath = "$env:APPVEYOR_BUILD_FOLDER\updater-key"
      $keyReady = $false
      if ($env:UPDATER_KEY) {
        $keyMaterial = $env:UPDATER_KEY.Trim().Trim('"').Trim("'")
        try {
          if ($keyMaterial -match 'BEGIN OPENSSH PRIVATE KEY') {
            [System.IO.File]::WriteAllText($keyPath, $keyMaterial, [System.Text.UTF8Encoding]::new($false))
            $keyReady = $true
          } else {
            $normalized = ($keyMaterial -replace '\s', '')
            [System.IO.File]::WriteAllBytes($keyPath, [System.Convert]::FromBase64String($normalized))
            $keyReady = $true
          }
        } catch {
          Write-Host "Failed to decode UPDATER_KEY: $_"
        }
      }
      if ($keyReady) {
        go run "$env:APPVEYOR_BUILD_FOLDER\cmd\sign-release\main.go" $keyPath "$env:APPVEYOR_BUILD_FOLDER\bin\TcNo-Acc-Switcher.exe" | Out-File -Encoding ascii "$env:APPVEYOR_BUILD_FOLDER\bin\TcNo-Acc-Switcher.exe.sig"
        if ($LASTEXITCODE -ne 0) {
          Write-Host "Ed25519 signing failed."
          Remove-Item -Force "$env:APPVEYOR_BUILD_FOLDER\bin\TcNo-Acc-Switcher.exe.sig" -ErrorAction SilentlyContinue
        } else {
          Write-Host "Ed25519 signature created."
        }
        Remove-Item -Force $keyPath -ErrorAction SilentlyContinue
      } else {
        Write-Host "Ed25519 signing skipped (UPDATER_KEY not set or invalid)."
      }

      Write-Host "Copying NSIS images..."
      $imgDest = "$env:APPVEYOR_BUILD_FOLDER\build\windows\nsis\img"
      New-Item -ItemType Directory -Force -Path $imgDest | Out-Null
      Copy-Item -Force "$env:APPVEYOR_BUILD_FOLDER\other\NSIS\img\*" $imgDest

      Write-Host "Fetching WebView2 bootstrapper..."
      $nsisDir = "$env:APPVEYOR_BUILD_FOLDER\build\windows\nsis"
      wails3 generate webview2bootstrapper -dir $nsisDir 2>&1 | ForEach-Object { Write-Host $_ }

      Write-Host "Creating 7z archive for NSIS installer..."
      $stageDir = "$env:APPVEYOR_BUILD_FOLDER\bin\installer_stage"
      New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
      Copy-Item -Force "$env:APPVEYOR_BUILD_FOLDER\bin\TcNo-Acc-Switcher.exe" $stageDir
      Copy-Item -Force "$env:APPVEYOR_BUILD_FOLDER\bin\Platforms.json" $stageDir
      Copy-Item -Force "$env:APPVEYOR_BUILD_FOLDER\build\windows\nsis\MicrosoftEdgeWebview2Setup.exe" $stageDir

      & 7z a -mx9 "$env:APPVEYOR_BUILD_FOLDER\bin\TcNo-Acc-Switcher.7z" "$stageDir\*"
      Remove-Item -Recurse -Force $stageDir
      Write-Host "7z archive created."

      Write-Host "Generating SHA256SUMS..."
      $shaOut = "$env:APPVEYOR_BUILD_FOLDER\bin\SHA256SUMS"
      @(
        "$((Get-FileHash "$env:APPVEYOR_BUILD_FOLDER\bin\TcNo-Acc-Switcher.exe" -Algorithm SHA256).Hash.ToLower())  TcNo-Acc-Switcher.exe",
        "$((Get-FileHash "$env:APPVEYOR_BUILD_FOLDER\bin\TcNo-Acc-Switcher.7z" -Algorithm SHA256).Hash.ToLower())  TcNo-Acc-Switcher.7z"
      ) | Out-File -Encoding ascii $shaOut
      Write-Host "SHA256SUMS generated."

      Write-Host "Building NSIS installer..."
      Push-Location "$env:APPVEYOR_BUILD_FOLDER\build\windows\nsis"
      makensis -DVERSION="$env:NSIS_VERSION" -DDISPLAY_VERSION="$env:APP_VERSION" project.nsi
      Pop-Location
      Write-Host "NSIS installer built."

artifacts:
  - path: bin\TcNo-Acc-Switcher.exe
    name: executable
  - path: bin\TcNo-Acc-Switcher.exe.sig
    name: signature
  - path: build\windows\nsis\*installer*.exe
    name: installer
  - path: bin\TcNo-Acc-Switcher.7z
    name: archive
  - path: bin\SHA256SUMS
    name: checksums

deploy:
  - release: $(APPVEYOR_REPO_TAG_NAME)
    description: 'Release $(APPVEYOR_REPO_TAG_NAME)'
    provider: GitHub
    auth_token:
      secure: RV5NBPt9kVuEp2SyxG8FKkaA7a4quJTiaxtLCui6ipA/nMpyfma41fbrZ8LMCFwA # TODO: Change back when done with testing
    artifact: installer,executable,archive,signature,checksums
    draft: true
    prerelease: false
    on:
      APPVEYOR_REPO_TAG: true

